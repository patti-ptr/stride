<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Job Search">
<meta name="theme-color" content="#0f0f1a">
<title>Stride — Job Search</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;
  --border:#2a2a4a;--accent:#7c3aed;--accent2:#06b6d4;
  --gold:#f59e0b;--green:#10b981;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden}

.hdr{padding:18px 20px 14px;background:linear-gradient(180deg,rgba(124,58,237,.12),transparent);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.sub{font-size:12px;color:var(--muted)}

.scroll{flex:1;overflow-y:auto;padding:18px 20px}
.scroll::-webkit-scrollbar{display:none}

/* SEARCH CRITERIA CARD */
.crit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.crit-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.crit-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.crit-chip{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:500}
.chip-role{background:rgba(124,58,237,.15);color:#a78bfa}
.chip-board{background:rgba(6,182,212,.15);color:var(--accent2)}
.chip-loc{background:rgba(16,185,129,.15);color:var(--green)}

/* RUN BUTTON */
.run-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r);color:white;font-size:16px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px;transition:opacity .2s;letter-spacing:.3px}
.run-btn:active{opacity:.85}
.run-btn.loading{opacity:.6;pointer-events:none}

/* RESULTS */
.results-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.results-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text)}
.results-meta{font-size:11px;color:var(--muted)}

.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;transition:border-color .2s}
.result-card.flagged{border-color:var(--gold)}
.result-card.passed{opacity:.5}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.rc-org{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:2px}
.rc-role{font-size:15px;font-weight:600;line-height:1.3}
.rc-flag{flex-shrink:0;cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface2);border:1px solid var(--border);transition:all .2s}
.rc-flag.on{background:rgba(245,158,11,.15);border-color:var(--gold)}
.rc-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.rc-chip{font-size:10px;padding:2px 7px;border-radius:7px;font-weight:500}
.chip-loc{background:rgba(6,182,212,.1);color:var(--accent2)}
.chip-sal{background:rgba(16,185,129,.1);color:var(--green)}
.chip-dl{background:rgba(245,158,11,.1);color:var(--gold)}
.chip-board{background:rgba(124,58,237,.1);color:#a78bfa}
.rc-fit{font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:10px}
.rc-actions{display:flex;gap:7px}
.rc-btn{flex:1;padding:8px;border-radius:9px;border:none;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s;text-align:center}
.rc-btn:active{opacity:.7}
.btn-pursue{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
.btn-pass{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-open{background:rgba(6,182,212,.12);color:var(--accent2)}

/* PURSUE FLOW */
.pursue-card{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.25);border-radius:var(--r);padding:14px;margin-top:8px;display:none}
.pursue-card.open{display:block}
.pursue-title{font-size:12px;font-weight:600;color:#a78bfa;margin-bottom:8px}
.pursue-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;resize:none;height:70px;margin-bottom:8px}
.pursue-textarea:focus{border-color:var(--accent)}
.copy-prompt-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:white;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}

/* HISTORY */
.hist-section{margin-top:24px}
.hist-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.hist-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.hist-date{font-size:11px;color:var(--muted);margin-bottom:4px}
.hist-count{font-size:13px;font-weight:500}

/* STATUS */
.status-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;text-align:center}
.status-icon{font-size:32px;display:block;margin-bottom:6px}
.status-msg{font-size:13px;color:var(--muted);line-height:1.5}

.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--surface);border:1px solid var(--green);border-radius:10px;padding:9px 16px;font-size:12px;font-weight:500;z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);color:var(--green);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo">Stride ⚡ Job Search</div>
    <div class="sub">Weekly nonprofit ops search — powered by Claude</div>
  </div>

  <div class="scroll" id="scroll">

    <!-- SEARCH CRITERIA -->
    <div class="crit-card">
      <div class="crit-title">Search Criteria</div>
      <div class="crit-row">
        <span class="crit-chip chip-role">COO</span>
        <span class="crit-chip chip-role">Managing Director</span>
        <span class="crit-chip chip-role">VP Operations</span>
      </div>
      <div class="crit-row">
        <span class="crit-chip chip-board">Idealist</span>
        <span class="crit-chip chip-board">LinkedIn</span>
        <span class="crit-chip chip-board">Indeed</span>
        <span class="crit-chip chip-board">Work for Good</span>
      </div>
      <div class="crit-row">
        <span class="crit-chip chip-loc">Chicago + Remote</span>
        <span class="crit-chip chip-loc">Nonprofit / Mission-driven</span>
        <span class="crit-chip chip-loc">Past 7 days</span>
      </div>
    </div>

    <!-- RUN BUTTON -->
    <button class="run-btn" id="run-btn" onclick="runSearch()">
      🔍 Run This Week's Search
    </button>

    <!-- STATUS / RESULTS -->
    <div id="results-area"></div>

    <!-- SEARCH HISTORY -->
    <div class="hist-section" id="hist-section" style="display:none">
      <div class="hist-title">Past Searches</div>
      <div id="hist-list"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='stride_jobsearch_v1';

// ─── PROFILE ──────────────────────────────────────────────────────────────────
const PROFILE=`Patti Flynn — Chicago-based senior operations executive.
30 years experience. Most recently President & COO of a manufacturing company (Continental Datalabel).
Now pivoting to nonprofit and mission-driven sector.
Certifications: DEI ISO 30415, AIHR DEI, Grant Writing, Google Project Management (in progress).
Also: Board Chair Proud to Run Chicago (LGBTQ+ nonprofit), certified run coach, Impact Stride consulting.
Looking for: COO, Managing Director, VP Operations.
Strengths: enterprise integration, systems building, DEI, operational leadership, nonprofit sector transition.
NOT looking for: pure fundraising/development roles, highly technical/engineering roles.`;

const SEARCH_PROMPT=`You are a nonprofit job search assistant. Search for roles matching this criteria:

ROLES: COO, Managing Director, VP Operations (and close variants like Chief Operating Officer, Director of Operations, VP of Programs & Operations)
SECTOR: Nonprofit, social impact, mission-driven organizations ONLY
LOCATION: Chicago area (any Chicago neighborhood or suburb) OR fully remote
POSTED: Within the past 7 days from today
BOARDS: Idealist.org, LinkedIn, Indeed, Work for Good

CANDIDATE PROFILE:
${PROFILE}

Search all four boards using web search and return results as a JSON array. For each result include:
{
  "rank": 1,
  "org": "Organization name",
  "role": "Exact job title",
  "location": "City or Remote",
  "salary": "Salary range or null",
  "deadline": "Application deadline or null",
  "board": "Which board found this on",
  "url": "Direct job posting URL",
  "fit": "2-sentence fit assessment specific to Patti's background — mention specific overlap",
  "fitScore": 1-5
}

Sort by fitScore descending. Return a ranked shortlist followed by the raw JSON array.
Start the JSON array on its own line beginning with [ so it can be easily copied.
If a board returns no matching results, skip it. Include up to 12 results total.`;

// ─── STATE ────────────────────────────────────────────────────────────────────
let state={searches:[], flagged:{}, pursued:{}};
let currentResults=[];

function loadState(){
  try{ const s=localStorage.getItem(STORAGE_KEY); if(s) Object.assign(state,JSON.parse(s)); }catch(e){}
}
function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function runSearch(){
  // Step 1 — copy the prompt to clipboard
  // Step 2 — open claude.ai in a new tab
  // Claude will run the search with full web search capability

  const btn=document.getElementById('run-btn');

  // Show the prompt + open Claude instructions
  document.getElementById('results-area').innerHTML=`
    <div class="status-bar" style="text-align:left">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px">Two quick steps ⚡</div>
      <div style="font-size:13px;color:var(--text);line-height:1.6;margin-bottom:12px">
        <strong style="color:var(--accent2)">1.</strong> Tap <strong>Copy Prompt</strong> below<br>
        <strong style="color:var(--accent2)">2.</strong> Tap <strong>Open Claude</strong> — paste and hit send
      </div>
      <button class="run-btn" style="margin-bottom:10px" onclick="copySearchPrompt(this)">📋 Copy Search Prompt</button>
      <button class="run-btn" style="background:linear-gradient(135deg,#0ea5e9,#06b6d4)" onclick="openClaude()">↗ Open Claude.ai</button>
      <div style="margin-top:12px;font-size:11px;color:var(--muted);line-height:1.5">
        After Claude returns results, come back here and tap <strong style="color:var(--text)">Paste Results</strong> to save and track them.
      </div>
    </div>
    <button class="run-btn" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif" onclick="openPasteResults()">📥 Paste Results from Claude</button>
    <div id="paste-area" style="display:none;margin-top:4px">
      <textarea id="paste-input" style="width:100%;height:180px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;resize:none;margin-bottom:10px" placeholder="Paste Claude's JSON response here..."></textarea>
      <button class="run-btn" style="margin-bottom:0" onclick="processResults()">✓ Load Results</button>
    </div>`;
}

async function copySearchPrompt(btn){
  try{
    await navigator.clipboard.writeText(SEARCH_PROMPT);
  }catch(e){
    const ta=document.createElement('textarea');
    ta.value=SEARCH_PROMPT; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  btn.textContent='✓ Copied!';
  btn.style.background='var(--green)';
  showToast('Prompt copied — now open Claude and paste it');
  setTimeout(()=>{
    btn.innerHTML='📋 Copy Search Prompt';
    btn.style.background='';
  },2500);
}

function openClaude(){
  window.open('https://claude.ai/new','_blank');
}

function openPasteResults(){
  const area=document.getElementById('paste-area');
  area.style.display=area.style.display==='none'?'block':'none';
}

function processResults(){
  const raw=document.getElementById('paste-input').value.trim();
  if(!raw){ showToast('Paste Claude\'s response first'); return; }
  let results=[];
  try{
    // Try to extract JSON array from Claude's response
    const match=raw.match(/\[[\s\S]*\]/);
    if(match) results=JSON.parse(match[0]);
    else results=JSON.parse(raw);
  }catch(e){
    showToast('Could not parse results — make sure you copied the full response');
    return;
  }
  if(!results.length){ showToast('No results found in that response'); return; }
  currentResults=results;
  const searchRecord={date:new Date().toISOString().split('T')[0],count:results.length,results};
  state.searches.unshift(searchRecord);
  if(state.searches.length>12) state.searches=state.searches.slice(0,12);
  save();
  renderResults(results);
  renderHistory();
  showToast(results.length+' roles loaded ✓');
}

// ─── RENDER RESULTS ───────────────────────────────────────────────────────────
function renderResults(results){
  const flagCount=results.filter(r=>state.flagged[r.org+'_'+r.role]).length;
  let html=`<div class="results-hdr">
    <div class="results-title">${results.length} roles found</div>
    <div class="results-meta">${flagCount} flagged to pursue</div>
  </div>`;

  results.forEach((r,i)=>{
    const key=r.org+'_'+r.role;
    const isFlagged=!!state.flagged[key];
    const isPassed=!!state.pursued[key+'_passed'];
    const stars='⭐'.repeat(r.fitScore||0);

    html+=`<div class="result-card ${isFlagged?'flagged':''} ${isPassed?'passed':''}" id="rc-${i}">
      <div class="rc-top">
        <div>
          <div class="rc-org">${r.org}</div>
          <div class="rc-role">${r.role}</div>
        </div>
        <div class="rc-flag ${isFlagged?'on':''}" onclick="toggleFlag(${i},'${key}')" title="Flag to pursue">
          ${isFlagged?'⭐':'☆'}
        </div>
      </div>
      <div class="rc-meta">
        ${r.location?`<span class="rc-chip chip-loc">📍 ${r.location}</span>`:''}
        ${r.salary?`<span class="rc-chip chip-sal">💰 ${r.salary}</span>`:''}
        ${r.deadline?`<span class="rc-chip chip-dl">⏰ ${r.deadline}</span>`:''}
        <span class="rc-chip chip-board">${r.board}</span>
        <span style="font-size:11px;color:var(--gold)">${stars}</span>
      </div>
      <div class="rc-fit">${r.fit}</div>
      <div class="rc-actions">
        ${r.url?`<button class="rc-btn btn-open" onclick="openLink('${r.url}')">🔗 View Posting</button>`:''}
        <button class="rc-btn btn-pursue" onclick="openPursue(${i},'${key}')">✦ Pursue</button>
        <button class="rc-btn btn-pass" onclick="passRole(${i},'${key}')">Pass</button>
      </div>
      <div class="pursue-card" id="pursue-${i}">
        <div class="pursue-title">✦ Ready-to-use tailoring prompt</div>
        <textarea class="pursue-textarea" id="pursue-text-${i}" readonly></textarea>
        <button class="copy-prompt-btn" onclick="copyPursuePrompt(${i})">📋 Copy Prompt for Claude</button>
      </div>
    </div>`;
  });

  document.getElementById('results-area').innerHTML=html;
}

function toggleFlag(i, key){
  if(state.flagged[key]) delete state.flagged[key];
  else state.flagged[key]=true;
  save();
  const r=currentResults[i];
  const card=document.getElementById('rc-'+i);
  const btn=card.querySelector('.rc-flag');
  if(state.flagged[key]){ card.classList.add('flagged'); btn.classList.add('on'); btn.textContent='⭐'; }
  else{ card.classList.remove('flagged'); btn.classList.remove('on'); btn.textContent='☆'; }
  showToast(state.flagged[key]?'Flagged to pursue ⭐':'Flag removed');
}

function openLink(url){
  if(url&&url!=='null') window.open(url,'_blank');
  else showToast('No direct link available');
}

function passRole(i, key){
  state.pursued[key+'_passed']=true; save();
  document.getElementById('rc-'+i).classList.add('passed');
  showToast('Passed on this role');
}

function openPursue(i, key){
  const r=currentResults[i];
  const card=document.getElementById('pursue-'+i);
  const ta=document.getElementById('pursue-text-'+i);

  if(card.classList.contains('open')){
    card.classList.remove('open'); return;
  }

  const prompt=`I want to pursue this role:
Organization: ${r.org}
Title: ${r.role}
Location: ${r.location||'Not specified'}
${r.salary?'Salary: '+r.salary:''}

My background: 30 years senior operations experience, most recently President & COO of a manufacturing company. Pivoting to nonprofit/social impact. Certifications: DEI (ISO 30415, AIHR), Grant Writing, Google PM (in progress). Board Chair Proud to Run Chicago. Certified run coach.

Please:
1. Review my resume against this job description and flag gaps I should address
2. Suggest how to frame my for-profit background for this nonprofit role
3. Draft a tailored cover letter using the 5-paragraph structure: why this org, why keep reading, greatest hits, honest gap acknowledgment, clear call to action
4. Suggest 2-3 questions I should ask in the interview

Job description: [paste the job description here]`;

  ta.value=prompt;
  card.classList.add('open');
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function copyPursuePrompt(i){
  const ta=document.getElementById('pursue-text-'+i);
  try{ await navigator.clipboard.writeText(ta.value); }
  catch(e){ ta.select(); document.execCommand('copy'); }
  showToast('Prompt copied — paste into Claude ✓');
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory(){
  const hist=state.searches;
  if(!hist.length){ document.getElementById('hist-section').style.display='none'; return; }
  document.getElementById('hist-section').style.display='block';
  document.getElementById('hist-list').innerHTML=hist.map((s,i)=>`
    <div class="hist-entry" style="cursor:pointer" onclick="loadPastSearch(${i})">
      <div class="hist-date">${new Date(s.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',year:'numeric'})}</div>
      <div class="hist-count">${s.count} roles found ${i===0?'<span style="color:var(--accent2);font-size:11px">← latest</span>':''}</div>
    </div>`).join('');
}

function loadPastSearch(i){
  const s=state.searches[i];
  currentResults=s.results;
  renderResults(s.results);
  document.getElementById('scroll').scrollTop=0;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast'); clearTimeout(toastTimer);
  t.textContent=msg; t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

loadState();
renderHistory();

// Show last search on load if available
if(state.searches.length>0){
  currentResults=state.searches[0].results;
  renderResults(currentResults);
}
</script>
</body>
</html>
